<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAN Chat</title>

<script src="/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f75f6a;
    --green: #4ef094;
    --yellow: #f7d46a;
    --text: #e0dff8;
    --muted: #6b6a8a;
    --font-mono: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    --font-display: 'Segoe UI', 'Ubuntu', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== JOIN SCREEN ===== */
  #join-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    flex-direction: column;
    gap: 0;
  }

  .join-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px 48px;
    width: min(440px, 90vw);
    position: relative;
  }

  .join-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .join-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .join-badge::before {
    content: '';
    display: inline-block;
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .join-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 6px;
    line-height: 1;
    letter-spacing: -1px;
  }

  .join-sub {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 32px;
  }

  .input-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  #username-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }

  #username-input:focus {
    border-color: var(--accent);
  }

  #username-input::placeholder {
    color: var(--muted);
  }

  #join-btn {
    margin-top: 16px;
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  #join-btn:hover { background: #9380ff; }
  #join-btn:active { transform: scale(0.99); }

  /* ===== MAIN LAYOUT ===== */
  #app {
    display: none;
    flex: 1;
    flex-direction: column;
    height: 100dvh;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }

  #user-count {
    font-size: 12px;
    color: var(--muted);
  }

  #toggle-sidebar {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  #toggle-sidebar:hover { color: var(--text); border-color: var(--accent); }

  /* BODY */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* MESSAGES */
  #messages-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    padding: 6px 8px;
    border-radius: 4px;
    transition: background 0.15s;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg:hover { background: var(--surface2); }

  .msg.own { background: rgba(124, 106, 247, 0.07); }
  .msg.own:hover { background: rgba(124, 106, 247, 0.12); }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 3px;
    width: 42px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-user {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--accent);
  }

  .msg.own .msg-user { color: var(--accent2); }

  .msg-text {
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    color: var(--text);
  }

  /* SYSTEM MESSAGES */
  .sys-msg {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 8px;
    letter-spacing: 1px;
    animation: msgIn 0.2s ease;
  }

  .sys-msg.join { color: var(--green); }
  .sys-msg.leave { color: var(--yellow); }

  .sys-msg::before { content: '— '; }
  .sys-msg::after { content: ' —'; }

  /* INPUT BAR */
  #input-bar {
    display: flex;
    gap: 0;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    align-items: stretch;
  }

  .input-prefix {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    padding: 0 12px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    user-select: none;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }

  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: white;
    font-family: var(--font-mono);
    font-size: 18px;
    padding: 0 20px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
  }

  #send-btn:hover { background: #9380ff; }
  #send-btn:active { transform: scale(0.97); }

  /* SIDEBAR */
  #sidebar {
    width: 200px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
  }

  #sidebar.hidden { width: 0; border: none; }

  .sidebar-header {
    padding: 14px 16px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #user-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    font-size: 13px;
    animation: msgIn 0.2s ease;
  }

  .user-item .dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .user-item .uname {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .user-item.me .uname { color: var(--accent); font-weight: 700; }

  /* MOBILE */
  @media (max-width: 600px) {
    #sidebar { display: none; }
    #toggle-sidebar { display: none; }
    .input-prefix { display: none; }
    #messages { padding: 12px; }
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-badge">LAN · Local Network</div>
    <div class="join-title">LAN<span>Chat</span></div>
    <div class="join-sub">No internet needed — just your local network</div>
    <label class="input-label" for="username-input">Your username</label>
    <input id="username-input" type="text" placeholder="Enter a name..." maxlength="20" autocomplete="off" autofocus>
    <button id="join-btn">JOIN →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="header">
    <div class="header-left">
      <div class="status-dot"></div>
      <div class="logo">LAN<span>Chat</span></div>
    </div>
    <div id="user-count">0 online</div>
    <button id="toggle-sidebar">USERS</button>
  </div>

  <div id="body">
    <div id="messages-col">
      <div id="messages"></div>
      <div id="input-bar">
        <div class="input-prefix" id="input-prefix">you</div>
        <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" autocomplete="off">
        <button id="send-btn">↑</button>
      </div>
    </div>

    <div id="sidebar">
      <div class="sidebar-header">Online</div>
      <div id="user-list"></div>
    </div>
  </div>
</div>

<script>
  const socket = io();
  let myUsername = '';
  let sidebarVisible = true;

  const joinScreen = document.getElementById('join-screen');
  const app = document.getElementById('app');
  const usernameInput = document.getElementById('username-input');
  const joinBtn = document.getElementById('join-btn');
  const messages = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const userList = document.getElementById('user-list');
  const userCount = document.getElementById('user-count');
  const inputPrefix = document.getElementById('input-prefix');
  const sidebar = document.getElementById('sidebar');
  const toggleSidebar = document.getElementById('toggle-sidebar');

  function join() {
    const name = usernameInput.value.trim();
    if (!name) { usernameInput.focus(); return; }
    myUsername = name;
    inputPrefix.textContent = name;
    socket.emit('join', name);
    joinScreen.style.display = 'none';
    app.style.display = 'flex';
    msgInput.focus();
  }

  joinBtn.addEventListener('click', join);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit('message', text);
    msgInput.value = '';
    msgInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  toggleSidebar.addEventListener('click', () => {
    sidebarVisible = !sidebarVisible;
    sidebar.classList.toggle('hidden', !sidebarVisible);
  });

  socket.on('message', (data) => {
    const div = document.createElement('div');
    div.className = 'msg' + (data.username === myUsername ? ' own' : '');
    div.innerHTML = `
      <div class="msg-time">${data.time}</div>
      <div class="msg-body">
        <div class="msg-user">${esc(data.username)}</div>
        <div class="msg-text">${esc(data.text)}</div>
      </div>
    `;
    messages.appendChild(div);
    scrollBottom();
  });

  socket.on('system', (data) => {
    const div = document.createElement('div');
    div.className = `sys-msg ${data.type}`;
    div.textContent = data.text;
    messages.appendChild(div);
    scrollBottom();
  });

  socket.on('user-list', (users) => {
    userCount.textContent = `${users.length} online`;
    userList.innerHTML = '';
    users.forEach(name => {
      const div = document.createElement('div');
      div.className = 'user-item' + (name === myUsername ? ' me' : '');
      div.innerHTML = `<div class="dot"></div><div class="uname">${esc(name)}${name === myUsername ? ' (you)' : ''}</div>`;
      userList.appendChild(div);
    });
  });

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
